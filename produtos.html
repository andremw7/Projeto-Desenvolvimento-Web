<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADIMAX - O Melhor para o Seu Pet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .product-grid {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-top: 20px;
        }
        .product-grid figure {
            flex: 1;
            text-align: center;
        }
        .product-grid img {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 8px;
        }
        .product-grid-two-columns {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .product-grid-two-columns figure {
            text-align: center;
        }
        .product-grid-two-columns img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 8px;
        }
        .two-column-products h2 {
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <img src="fotos/adimax.jpeg" alt="Logo ADIMAX" class="logo" width="50px" height="50px">
            <ul>
                <li><a href="site.html">Início</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>



    <main>
        <div class="content">
            <section class="products">
                <h2>Classes de Produtos</h2>
                <div class="product-grid">
                    <figure>
                        <img src="fotos/formula.png" alt="Ração Premium para Cães">
                    </figure>
                    <figure>
                        <img src="fotos/origins.png" alt="Brinquedos para Gatos">
                    </figure>
                    <figure>
                        <img src="fotos/magnus.png" alt="Serviços de Banho e Tosa">
                    </figure>
                </div>
            </section>
        </div>
        <div class="two-column-products">
            <h2>Destaques</h2>
            <div class="product-grid-two-columns">
                <figure>
                    <img src="fotos/produto1.png" alt="Produto 1">
                </figure>
                <figure>
                    <img src="fotos/produto2.png" alt="Produto 2">
                </figure>
                <figure>
                    <img src="fotos/produto3.png" alt="Produto 3">
                </figure>
                <figure>
                    <img src="fotos/produto4.png" alt="Produto 4">
                </figure>
            </div>
        </div>
    </main>



    <footer>
        <section>
            <h4>Sobre Nós</h4>
            <p>No ADIMAX, cuidamos do seu pet como se fosse nosso. Venha nos visitar e descubra tudo o que temos para oferecer!</p>
        </section>
        <section>
            <h4>Links Rápidos</h4>
            <ul>
                <li><a href="site.html">Início</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="login.html">Login</a></li>
                
            </ul>
        </section>
        <section>
            <h4>Siga-nos</h4>
            <div class="social-icons">
                <a href="#" aria-label="Facebook">
                    <img src="fotos/facebook.png" alt="Facebook" width="24" height="24">
                </a>
                <a href="#" aria-label="Twitter">
                    <img src="fotos/X.png" alt="X" width="24" height="24">
                </a>
                <a href="#" aria-label="Instagram">
                    <img src="fotos/instagram.png" alt="Instagram" width="24" height="24">
                </a>
            </div>
        </section>
    </footer>
</body>
</html>
