<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Online - Mockup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        header, footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1rem;
        }
        main {
            padding: 2rem;
        }
        .login, .produtos, .admin {
            background-color: white;
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .btn {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Minha Loja Online</h1>
    </header>

    <main>
        <section class="login">
            <h2>Login</h2>
            <input type="text" placeholder="Email">
            <input type="password" placeholder="Senha">
            <button class="btn">Entrar</button>
        </section>

        <section class="produtos">
            <h2>Produtos em Destaque</h2>
            <ul>
                <li>Produto 1 - R$100</li>
                <li>Produto 2 - R$200</li>
                <li>Produto 3 - R$300</li>
            </ul>
        </section>

        <section class="admin">
            <h2>Painel do Administrador</h2>
            <button class="btn">Cadastrar Produto</button>
            <button class="btn">Editar Produto</button>
            <button class="btn">Excluir Produto</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Minha Loja Online. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
